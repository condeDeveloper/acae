services:
  - type: web
    name: acae
    runtime: node
    rootDir: .
    buildCommand: bash build.sh
    startCommand: cd backend && npx prisma migrate deploy && node dist/src/app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: HOST
        value: 0.0.0.0
      # Setar no painel do Render (não commitar valores reais):
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPA_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: APP_URL
        sync: false
      # VITE_ vars são usadas no build do frontend (tempo de compilação)
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_API_BASE_URL
        sync: false
